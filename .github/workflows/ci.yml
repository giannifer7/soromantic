name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target:
          - glibc
          - musl
          - windows
          - fedora
          - artix
          - ubuntu

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Just
        uses: extractions/setup-just@v2

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build target image
        run: just build ${{ matrix.target }}

      - name: Export artifacts
        run: just export ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: soromantic-${{ matrix.target }}
          path: dist/${{ matrix.target }}
